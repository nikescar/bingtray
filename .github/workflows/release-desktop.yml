name: Release to Snapstore and Flathub

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:

jobs:
  download-and-deploy:
    runs-on: ubuntu-latest
    # Only run if the upstream workflow succeeded, or if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact from latest build
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: release.yml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          name_is_regexp: true
          name: bingtray-(x86_64|aarch64|armv7).*linux.*
          path: artifacts
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_artifacts: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: List downloaded files (verification)
        run: ls -R artifacts/

      - name: Prepare binaries for snap
        run: |
          mkdir -p snap-binaries/x86_64
          mkdir -p snap-binaries/aarch64
          mkdir -p snap-binaries/armv7

          # Extract binaries from artifacts
          if [ -d "artifacts/bingtray-x86_64-unknown-linux-musl" ]; then
            cp artifacts/bingtray-x86_64-unknown-linux-musl/bingtray snap-binaries/x86_64/
            chmod +x snap-binaries/x86_64/bingtray
          fi

          if [ -d "artifacts/bingtray-aarch64-unknown-linux-musl" ]; then
            cp artifacts/bingtray-aarch64-unknown-linux-musl/bingtray snap-binaries/aarch64/
            chmod +x snap-binaries/aarch64/bingtray
          fi

          if [ -d "artifacts/bingtray-armv7-unknown-linux-musleabihf" ]; then
            cp artifacts/bingtray-armv7-unknown-linux-musleabihf/bingtray snap-binaries/armv7/
            chmod +x snap-binaries/armv7/bingtray
          fi

          echo "Prepared binaries:"
          ls -R snap-binaries/

  publish-snapstore:
    runs-on: ubuntu-latest
    needs: download-and-deploy
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            artifact-name: bingtray-x86_64-unknown-linux-musl
          - architecture: arm64
            artifact-name: bingtray-aarch64-unknown-linux-musl
          - architecture: armhf
            artifact-name: bingtray-armv7-unknown-linux-musleabihf

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: release.yml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ matrix.artifact-name }}
          path: artifacts
          if_no_artifact_found: fail
          skip_unpack: false

      - name: Debug - List downloaded artifacts
        run: |
          echo "Listing artifacts directory:"
          ls -laR artifacts/
          echo "Current directory:"
          pwd
          ls -la

      - name: Sync version from Cargo.toml to snapcraft.yaml
        run: |
          # Extract version from Cargo.toml
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Found version in Cargo.toml: $VERSION"

          # Update version in snapcraft.yaml
          sed -i "s/^version: .*/version: $VERSION/" snap/snapcraft.yaml

          echo "Updated snapcraft.yaml version:"
          grep "^version:" snap/snapcraft.yaml

      - name: Prepare snap binary in expected location
        run: |
          # Create the directory structure that snapcraft expects
          # All architectures use target/release/bingtray as per snapcraft.yaml
          mkdir -p target/release
          cp artifacts/bingtray target/release/
          chmod +x target/release/bingtray
          echo "Prepared ${{ matrix.architecture }} binary:"
          ls -la target/release/
          echo "Binary info:"
          file target/release/bingtray || true

      - name: Build snap package for ${{ matrix.architecture }}
        uses: snapcore/action-build@v1
        id: build
        env:
          TARGET_ARCH: ${{ matrix.architecture }}
        with:
          snapcraft-channel: stable

      - name: Publish snap to store (${{ matrix.architecture }})
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPSTORE_LOGIN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge

  publish-flathub:
    runs-on: ubuntu-latest
    needs: download-and-deploy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: release.yml
          run_id: ${{ github.event.workflow_run.id }}
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name_is_regexp: true
          name: bingtray-(x86_64|aarch64).*linux.*
          path: artifacts-download
          if_no_artifact_found: fail

      - name: Prepare binary for Flatpak
        run: |
          echo "Downloaded artifacts:"
          ls -laR artifacts-download/

          # Create artifacts directory for flatpak manifest
          mkdir -p artifacts

          # Find and copy the x86_64 binary (primary target for flatpak)
          if [ -f "artifacts-download/bingtray" ]; then
            cp artifacts-download/bingtray artifacts/
          elif [ -d "artifacts-download/bingtray-x86_64-unknown-linux-musl" ]; then
            cp artifacts-download/bingtray-x86_64-unknown-linux-musl/bingtray artifacts/
          else
            echo "Searching for bingtray binary..."
            find artifacts-download -name bingtray -type f -exec cp {} artifacts/ \; -quit
          fi

          chmod +x artifacts/bingtray
          echo "Prepared binary for Flatpak:"
          ls -la artifacts/

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir deploy/flatpak/pe.nikescar.bingtray.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo bingtray.flatpak pe.nikescar.bingtray

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: bingtray-flatpak
          path: bingtray.flatpak
          retention-days: 7

      # Note: Actual Flathub publishing requires submitting to the Flathub repository
      # This creates a flatpak bundle that can be manually submitted
      - name: Flathub publishing note
        run: |
          echo "To publish to Flathub, submit a PR to https://github.com/flathub/flathub"
          echo "with your pe.nikescar.bingtray.yml manifest file"
