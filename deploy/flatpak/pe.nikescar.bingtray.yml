app-id: pe.nikescar.bingtray
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: bingtray
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --filesystem=xdg-config/bingtray:create
  - --filesystem=xdg-pictures:rw
  - --filesystem=xdg-data/backgrounds:create
  - --system-talk-name=org.freedesktop.Accounts
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Background
  - --device=dri

modules:
  - name: bingtray
    buildsystem: simple
    build-commands:
      - install -Dm755 bingtray /app/bin/bingtray
      - install -Dm644 pe.nikescar.bingtray.desktop /app/share/applications/pe.nikescar.bingtray.desktop
      - install -Dm644 pe.nikescar.bingtray.metainfo.xml /app/share/metainfo/pe.nikescar.bingtray.metainfo.xml
      - install -Dm644 logo.png /app/share/icons/hicolor/256x256/apps/pe.nikescar.bingtray.png
    sources:
      - type: file
        path: artifacts/bingtray
      - type: file
        path: deploy/flatpak/pe.nikescar.bingtray.desktop
      - type: file
        path: deploy/flatpak/pe.nikescar.bingtray.metainfo.xml
      - type: file
        path: imgs/logo.png